              <span class="note-tag">微积分</span>
              <span class="note-date">示例笔记</span>
            </div>
            <h3 class="note-title">傅里叶级数的基本形式</h3>

            <p class="note-text">对周期函数 \(f(x)\)，可以尝试写成</p>

            <div class="note-math">
              \[
              f(x) \sim \frac{a_0}{2} + \sum_{n=1}^{\infty}\left(a_n\cos nx + b_n\sin nx\right)
              \]
            </div>

            <p class="note-text">
              这里的核心是三角函数系在合适内积下的正交性。
            </p>
          </article>
        </section>

      </div>
