<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yang181969</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style-global.css">
  <link rel="stylesheet" href="css/style-theme.css">
  <link rel="stylesheet" href="css/style-animes.css">
  <link rel="stylesheet" href="css/style-comment.css">
  <link rel="stylesheet" href="css/style-update.css">
  <link rel="stylesheet" href="css/style-gallery.css">
  <link rel="stylesheet" href="css/style-notes.css">
  <link rel="stylesheet" href="css/style-about.css">

  <!-- KaTeX：改为国内镜像 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script defer src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

  <!-- p5.js：改为国内镜像 -->
  <script defer src="https://cdn.bootcdn.net/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>
  <div class="layout">

    <!-- 头部 -->
    <header>
      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" alt="logo">
        <span>Yang181969</span>
      </a>

      <div class="theme-control">
        <button id="theme-toggle">🎨</button>
        <div class="theme-panel" id="theme-panel">
          <label>主题颜色</label>
          <div class="theme-preview"></div>
          <input type="range" id="hue-slider" min="0" max="360" value="330">
        </div>
      </div>
    </header>

    <!-- 左侧导航 -->
    <nav>
      <a href="index.html" class="nav-link">主页</a>
      <a href="index.html?page=gallery" class="nav-link">画廊</a>
      <a href="index.html?page=anime" class="nav-link">动漫</a>
      <a href="index.html?page=notes" class="nav-link">笔记</a>
      <a href="index.html?page=comment" class="nav-link">留言</a>
      <a href="index.html?page=update" class="nav-link">更新</a>
      <a href="index.html?page=about" class="nav-link">关于</a>
    </nav>

    <!-- 主内容 -->
    <div class="content-scroll">
      <main id="main-content">
        <section class="home-page no-card">

          <div class="home-hero">
            <h2 class="page-title">主页</h2>
            <p class="page-desc">这是我的个人网站，用来记录兴趣、图片、动漫、笔记和交流。</p>
          </div>

          <article class="card">
            <h2>关于这个网页</h2>
            <p>这是我个人的网站，用来记录生活、动漫和笔记。</p>
          </article>

          <article class="card">
            <h2>你可以在这里看到什么？</h2>
            <ul>
              <li>生活记录</li>
              <li>动漫推荐</li>
              <li>学习笔记</li>
              <li>留言互动</li>
            </ul>
          </article>

          <article class="card">
            <h2>欢迎交流</h2>
            <p>可以在留言页面留下你的建议。</p>
          </article>

        </section>
      </main>

      <!-- 底部 -->
      <footer>
        <p>2026 Yang's website</p>
      </footer>
    </div>

  </div>

  <!-- JS -->
  <script src="js/theme.js"></script>
  <script src="js/main.js"></script>
  <script src="js/comment.js"></script>
  <script src="js/animes.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/gallery-data.js"></script>
  <script src="js/notes.js"></script>

  <button id="back-to-top">↑</button>
</body>
</html>
